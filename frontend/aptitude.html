<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCS Aptitude Test | techworldindia</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins',sans-serif;
            background:#05080f;
            color:white;
            padding:20px;
        }

        .quiz-container{
            max-width:1000px;
            margin:auto;
        }

        .title{
            text-align:center;
            margin-bottom:10px;
            font-size:40px;
            background:linear-gradient(45deg,#00c6ff,#0072ff);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        #timer{
            text-align:center;
            margin:20px 0;
            color:#00c6ff;
        }

        .question-card{
            background:#0d1220;
            padding:25px;
            margin-bottom:20px;
            border-radius:15px;
            border:1px solid #1e293b;
            transition:0.3s;
        }

        .question-card:hover{
            transform:translateY(-2px);
        }

        .question-card h2{
            margin-bottom:15px;
            font-size:20px;
            line-height:1.5;
        }

        label{
            display:block;
            margin:12px 0;
            background:#111827;
            padding:12px;
            border-radius:10px;
            cursor:pointer;
            transition:0.3s;
        }

        label:hover{
            background:#1f2937;
        }

        input[type="radio"]{
            margin-right:10px;
        }

        #submitBtn{
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            background:linear-gradient(45deg,#00c6ff,#0072ff);
            color:white;
            font-size:18px;
            font-weight:600;
            cursor:pointer;
            margin-top:20px;
        }

        #submitBtn:hover{
            opacity:0.9;
        }

        #result{
            margin-top:30px;
            text-align:center;
            color:#00ff99;
        }

        #wrongAnswers{
            margin-top:30px;
        }

    </style>

</head>

<body>

    <div class="quiz-container">

        <h1 class="title">TCS Aptitude Test</h1>

        <h2 style="text-align:center;">Time = 30 Minutes</h2>

        <h2 id="timer">Time Left: 30:00</h2>

        <div id="quizBox"></div>

        <button type="button" onclick="submitQuiz()" id="submitBtn">
            Submit Test
        </button>

        <h2 id="result"></h2>

        <div id="wrongAnswers"></div>

    </div>

    <script>

        const allQuestions = [

            {
                question:"What is 20% of 250?",
                options:["25","40","50","60"],
                answer:"50"
            },

            {
                question:"Find the next number: 2, 4, 8, 16, ?",
                options:["24","32","48","64"],
                answer:"32"
            },

            {
                question:"Choose synonym of Honest.",
                options:["Truthful","Lazy","Weak","Cruel"],
                answer:"Truthful"
            },

            {
                question:"If CAT = DBU, then DOG = ?",
                options:["EPH","EOH","EPG","FPI"],
                answer:"EPH"
            },

            {
                question:"Probability of getting head in coin toss?",
                options:["0","1/2","1","2"],
                answer:"1/2"
            },

            {
                question:"Choose grammatically correct sentence.",
                options:[
                    "She do not play.",
                    "She does not play.",
                    "She does not plays.",
                    "She not play."
                ],
                answer:"She does not play."
            },

            {
                question:"Bought for ₹800 and sold for ₹1000. Profit?",
                options:["₹100","₹150","₹200","₹250"],
                answer:"₹200"
            },

            {
                question:"Find next number: 1, 4, 9, 16, ?",
                options:["20","25","30","36"],
                answer:"25"
            },

            {
                question:"If A completes work in 8 days, one day work = ?",
                options:["1/6","1/8","1/10","1/12"],
                answer:"1/8"
            },

            {
                question:"Sales increased from 400 to 500. Percentage increase?",
                options:["20%","25%","30%","35%"],
                answer:"25%"
            },

            {
                question:"Square root of 169 is?",
                options:["11","12","13","14"],
                answer:"13"
            },

            {
                question:"Find odd one out.",
                options:["Rose","Lily","Lotus","Carrot"],
                answer:"Carrot"
            },

            {
                question:"Choose antonym of Expand.",
                options:["Grow","Increase","Shrink","Develop"],
                answer:"Shrink"
            },

            {
                question:"Probability of getting even number on dice?",
                options:["1/6","1/3","1/2","2/3"],
                answer:"1/2"
            },

            {
                question:"Choose correct sentence.",
                options:[
                    "They is playing.",
                    "They are playing.",
                    "They plays.",
                    "They playing."
                ],
                answer:"They are playing."
            },

            {
                question:"Cost price ₹500, selling price ₹650. Profit percentage?",
                options:["20%","25%","30%","35%"],
                answer:"30%"
            },

            {
                question:"Find next number: 3, 6, 12, 24, ?",
                options:["36","48","60","72"],
                answer:"48"
            },

            {
                question:"Production increased from 1000 to 1200. Percentage increase?",
                options:["10%","15%","20%","25%"],
                answer:"20%"
            },

            {
                question:"What is 35% of 400?",
                options:["120","140","160","180"],
                answer:"140"
            },

            {
                question:"Choose synonym of Rapid.",
                options:["Slow","Quick","Weak","Lazy"],
                answer:"Quick"
            },

            {
                question:"Probability of getting odd number on dice?",
                options:["1/6","1/3","1/2","2/3"],
                answer:"1/2"
            },

            {
                question:"What is 45% of 200?",
                options:["70","80","90","100"],
                answer:"90"
            },

            {
                question:"Choose synonym of Brave.",
                options:["Coward","Bold","Weak","Shy"],
                answer:"Bold"
            },

            {
                question:"Probability of getting number 3 on a dice?",
                options:["1/2","1/3","1/6","2/3"],
                answer:"1/6"
            },

            {
                question:"What is 60% of 500?",
                options:["200","250","300","350"],
                answer:"300"
            },

            {
                question:"Choose antonym of Strong.",
                options:["Powerful","Weak","Bold","Hard"],
                answer:"Weak"
            },

            {
                question:"Probability of getting tail in coin toss?",
                options:["0","1/2","1","2"],
                answer:"1/2"
            },

            {
                question:"What is 75% of 800?",
                options:["500","550","600","650"],
                answer:"600"
            },

            {
                question:"Choose synonym of Tiny.",
                options:["Huge","Small","Tall","Wide"],
                answer:"Small"
            },

            {
                question:"Probability of getting red ball from bag with only red balls?",
                options:["0","1/4","1/2","1"],
                answer:"1"
            },

            {
                question:"What is 90% of 300?",
                options:["240","250","260","270"],
                answer:"270"
            },

            {
                question:"Choose antonym of Victory.",
                options:["Success","Defeat","Growth","Pride"],
                answer:"Defeat"
            }

        ];

        // RANDOM 30 QUESTIONS

        const shuffled = allQuestions.sort(() => 0.5 - Math.random());

        const questions = shuffled.slice(0,30);

        const quizBox = document.getElementById("quizBox");

        const result = document.getElementById("result");

        const wrongAnswers = document.getElementById("wrongAnswers");

        const submitBtn = document.getElementById("submitBtn");

        // LOAD QUESTIONS

        questions.forEach((q,index)=>{

            let optionsHTML = "";

            q.options.forEach(option=>{

                optionsHTML += `

                    <label>

                        <input type="radio" name="q${index}" value="${option}">

                        ${option}

                    </label>

                `;

            });

            quizBox.innerHTML += `

                <div class="question-card">

                    <h2>${index + 1}. ${q.question}</h2>

                    ${optionsHTML}

                </div>

            `;

        });

        // TIMER

        let timeLeft = 1800;

        const timer = document.getElementById("timer");

        const countdown = setInterval(()=>{

            let minutes = Math.floor(timeLeft / 60);

            let seconds = timeLeft % 60;

            seconds = seconds < 10 ? "0" + seconds : seconds;

            timer.innerHTML = `Time Left: ${minutes}:${seconds}`;

            timeLeft--;

            if(timeLeft < 0){

                clearInterval(countdown);

                submitQuiz();

            }

        },1000);

        // SUBMIT QUIZ

        function submitQuiz(){

            clearInterval(countdown);

            let score = 0;

            let wrongHTML = "";

            questions.forEach((q,index)=>{

                const selected = document.querySelector(
                    `input[name="q${index}"]:checked`
                );

                if(selected && selected.value === q.answer){

                    score++;

                }
                else{

                    wrongHTML += `

                        <div class="question-card">

                            <h3 style="color:#ff4d4d;">
                                Wrong Question
                            </h3>

                            <p>${q.question}</p>

                            <p>
                                Correct Answer:
                                <b style="color:#00ff99;">
                                    ${q.answer}
                                </b>
                            </p>

                        </div>

                    `;

                }

            });

            result.innerHTML = `

                Your Score: ${score} / ${questions.length}

                <br><br>

                Thank You For Attending Test ❤️

                <br>

                Keep Practicing 🚀

            `;

            wrongAnswers.innerHTML = wrongHTML;

            // DISABLE INPUTS

            const allInputs = document.querySelectorAll("input");

            allInputs.forEach(input=>{

                input.disabled = true;

            });

            submitBtn.disabled = true;

            submitBtn.innerHTML = "Test Submitted";

        }

    </script>

</body>

</html>
