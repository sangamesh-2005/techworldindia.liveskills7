<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | techworldindia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background:#05080f; color:#fff; font-family:'Poppins',sans-serif; }
        nav a { color:#fff; text-decoration:none; margin:0 12px; }
        .dash-card { background:#0b0f19; border-radius:12px; padding:28px; text-align:center; border-top:3px solid #0072ff; }
        .dash-number { font-size:2.5rem; font-weight:700; background:linear-gradient(45deg,#00c6ff,#0072ff); -background-clip:text; -webkit-text-fill-color:black; }
        .gradient-text { background:linear-gradient(45deg,#00c6ff,#0072ff); -background-clip:text; -webkit-text-fill-color:black; }
    </style>
</head>
<body>
<nav class="py-3 px-4" style="background:#0b0f19;">
    <a href="index.html">🏠 Home</a>
    <a href="test.html">📝 Take Test</a>
    <a href="scoreboard.html">🏆 Scoreboard</a>
    <span id="navUser" class="text-info ms-3"></span>
    <a href="login.html" id="logoutBtn" onclick="logout()" class="text-danger ms-3 d-none">Logout</a>
</nav>

<div class="container mt-5">
    <h2 class="mb-1">📊 <span class="gradient-text">Dashboard</span></h2>
    <p id="welcomeMsg" class="text-secondary mb-4">Loading your stats...</p>
    <div class="row g-4" id="dashCards">
        <div class="col-sm-6 col-lg-3">
            <div class="dash-card"><div class="dash-number" id="statProblems">—</div><div>Practice Problems</div></div>
        </div>
        <div class="col-sm-6 col-lg-3">
            <div class="dash-card"><div class="dash-number" id="statHackathons">—</div><div>Upcoming Hackathons</div></div>
        </div>
        <div class="col-sm-6 col-lg-3">
            <div class="dash-card"><div class="dash-number" id="statScore">—</div><div>Latest Score</div></div>
        </div>
        <div class="col-sm-6 col-lg-3">
            <div class="dash-card"><div class="dash-number" id="statRank">—</div><div>Leaderboard Rank</div></div>
        </div>
    </div>
</div>

<script>
const API = "http://localhost:5000/api";
const user = JSON.parse(localStorage.getItem("user") || "null");

if (user) {
    document.getElementById("navUser").textContent = "👋 " + user.name;
    document.getElementById("logoutBtn").classList.remove("d-none");
    document.getElementById("welcomeMsg").textContent = `Welcome back, ${user.name}!`;
} else {
    document.getElementById("welcomeMsg").innerHTML = `<a href="login.html" class="text-info">Login</a> to see your personal stats.`;
}

function logout() {
    localStorage.removeItem("user");
    window.location.href = "index.html";
}

async function loadDashboard() {
    try {
        const url = user ? `${API}/dashboard?user_id=${user.id}` : `${API}/dashboard`;
        const res = await fetch(url);
        const data = await res.json();
        document.getElementById("statProblems").textContent = data.totalProblems ?? "—";
        document.getElementById("statHackathons").textContent = data.upcomingHackathons ?? "—";
        if (data.latestScore) {
            document.getElementById("statScore").textContent = `${data.latestScore.score}/${data.latestScore.total}`;
            document.getElementById("statRank").textContent = `#${data.leaderboardRank}`;
        }
    } catch (err) {
        document.getElementById("welcomeMsg").textContent += " (Could not load stats — is the server running?)";
    }
}

loadDashboard();

</script>
</body>
</html>
