<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | techworldindia.liveskills2026</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b, #111827);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

.signup-container {
    width: 100%;
    max-width: 450px;
    background: rgba(255,255,255,0.08);
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}

.signup-container h1 {
    text-align: center;
    margin-bottom: 10px;
}

.signup-container p {
    text-align: center;
    color: #cbd5e1;
    margin-bottom: 30px;
}

.form-control {
    width: 100%;
    padding: 14px;
    margin-bottom: 20px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 16px;
}

.btn-signup {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg,#2563eb,#7c3aed);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.btn-signup:hover {
    transform: scale(1.03);
}

.bottom-text {
    text-align: center;
    margin-top: 20px;
    color: #cbd5e1;
}

.bottom-text a {
    color: #60a5fa;
    text-decoration: none;
}
</style>
</head>

<body class="auth-page">

    <div class="container">
        <div class="row justify-content-center align-items-center vh-100">
            <div class="col-md-5">
                <div class="glass-card p-5">
                    <div class="text-center mb-4">
                        <a class="navbar-brand fs-3" href="index.html">techworldindia.<span>liveskills2026</span></a>
                        <input type="text" id="name" placeholder="Full Name" class="form-control mb-3">
                        <p class="text-secondary">Join us and start your journey</p>
                    </div>
                    <form id="signupForm">
                        <div class="mb-3">
                            <label for="name" class="form-label">Full Name</label>
                            <input type="text" id="name" class="form-control" placeholder="Full Name">
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" id="email" class="form-control" placeholder="Email">
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" id="password" class="form-control" placeholder="Password">
                        </div>
                        <div class="mb-5">
                             <label for="Retype password" class="form-label">Retype Password</label>
                            <input type="Retype password" id="Retype password" class="form-control" placeholder="Retype Password">
                        </div>
                            
                        <button class="btn btn-primary w-100" onclick="registerUser(event)">Sign Up</button>
                    </form>
                    <div class="text-center mt-4">
                        <p>Already have an account? <a href="login.html"
                                class="text-primary text-decoration-none fw-bold">Login</a></p>
                    </div>
                    <div id="message" class="mt-3 text-center"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Custom JS -->
    <script src="js/auth.js"></script>
    <script>
const API = "http://localhost:5000/api";

async function registerUser(event) {
    event.preventDefault();

    const name = document.getElementById("name").value;
    const email = document.querySelector("input[type='email']").value;
    const password = document.querySelector("input[type='password']").value;

    if (!name || !email || !password) {
        alert("Enter all fields");
        return;
    }

    const res = await fetch(`${API}/register`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ name, email, password })
    });

    const data = await res.json();
    alert(data.message);

    if (data.message.includes("success")) {
        window.location.href = "login.html";
    }
}
</script>
<script>
document.querySelector("form").addEventListener("submit", function(e) {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    localStorage.setItem("name", name);
    localStorage.setItem("email", email);
    localStorage.setItem("password", password);
    localStorage.setItem("Retype password", Retypepassword);

    alert("Signup Successful!");

    window.location.href = "login.html";
});
</script>
</body>

</html>
