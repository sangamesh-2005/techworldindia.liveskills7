<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | techworldindia.liveskills2026</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-page">

    <div class="container">
        <div class="row justify-content-center align-items-center vh-100">
            <div class="col-md-5">
                <div class="glass-card p-5">
                    <div class="text-center mb-4">
                        <a class="navbar-brand fs-3" href="index.html">techworldindia.<span>liveskills2026</span></a>
                        <input type="text" id="name" placeholder="Full Name" class="form-control mb-3">
                        <p class="text-secondary">Join us and start your journey</p>
                    </div>
                    <form id="signupForm">
                        <div class="mb-3">
                            <label for="name" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="name" placeholder="John Doe" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                        </div>
                        <button class="btn btn-primary w-100" onclick="registerUser(event)">Sign Up</button>
                    </form>
                    <div class="text-center mt-4">
                        <p>Already have an account? <a href="login.html"
                                class="text-primary text-decoration-none fw-bold">Login</a></p>
                    </div>
                    <div id="message" class="mt-3 text-center"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Custom JS -->
    <script src="js/auth.js"></script>
    <script>
const API = "http://localhost:5000/api";

async function registerUser(event) {
    event.preventDefault();

    const name = document.getElementById("name").value;
    const email = document.querySelector("input[type='email']").value;
    const password = document.querySelector("input[type='password']").value;

    if (!name || !email || !password) {
        alert("Enter all fields");
        return;
    }

    const res = await fetch(`${API}/register`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ name, email, password })
    });

    const data = await res.json();
    alert(data.message);

    if (data.message.includes("success")) {
        window.location.href = "login.html";
    }
}
</script>
</body>

</html>
