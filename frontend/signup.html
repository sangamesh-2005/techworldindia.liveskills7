<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | techworldindia.liveskills2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b, #111827);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .glass-card {
            width: 100%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.08);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        }

        .brand-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
        }

        .brand-title span {
            color: #60a5fa;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1) !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            color: white !important;
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 15px;
        }

        .form-control::placeholder {
            color: #94a3b8;
        }

        .form-control:focus {
            box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.4) !important;
            outline: none;
        }

        .form-label {
            color: #cbd5e1;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .btn-signup {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #2563eb, #7c3aed);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-signup:hover {
            transform: scale(1.02);
            opacity: 0.95;
        }

        .bottom-text {
            text-align: center;
            margin-top: 20px;
            color: #cbd5e1;
            font-size: 14px;
        }

        .bottom-text a {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 600;
        }

        #message {
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="text-center mb-4">
        <a class="brand-title" href="index.html">techworldindia.<span>liveskills2026</span></a>
        <p class="mt-2" style="color:#cbd5e1; font-size:14px;">Join us and start your journey</p>
    </div>

    <!-- FIX: Single clean form, no duplicate inputs -->
    <form id="signupForm" onsubmit="registerUser(event)">
        <div class="mb-3">
            <label for="name" class="form-label">Full Name</label>
            <input type="text" id="name" class="form-control" placeholder="Full Name" required>
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="Email" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" class="form-control" placeholder="Password" required>
        </div>
        <div class="mb-4">
            <!-- FIX: type="password" not "Retype password" -->
            <label for="retypePassword" class="form-label">Retype Password</label>
            <input type="password" id="retypePassword" class="form-control" placeholder="Retype Password" required>
        </div>

        <button type="submit" class="btn-signup">Sign Up</button>
    </form>

    <div class="bottom-text">
        Already have an account? <a href="login.html">Login</a>
    </div>

    <div id="message" class="mt-3 text-center"></div>
</div>

<script>
    // FIX: Single unified handler - uses localStorage (no backend needed)
    function registerUser(event) {
        event.preventDefault();

        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const retypePassword = document.getElementById("retypePassword").value;
        const messageEl = document.getElementById("message");

        // Validate all fields
        if (!name || !email || !password || !retypePassword) {
            showMessage("Please fill in all fields.", "text-danger");
            return;
        }

        // FIX: Actually validate password match
        if (password !== retypePassword) {
            showMessage("Passwords do not match!", "text-danger");
            return;
        }

        if (password.length < 6) {
            showMessage("Password must be at least 6 characters.", "text-danger");
            return;
        }

        // Save to localStorage
        localStorage.setItem("name", name);
        localStorage.setItem("email", email);
        localStorage.setItem("password", password);
        localStorage.setItem("loggedIn", "false");

        showMessage("Signup successful! Redirecting to login...", "text-success");

        setTimeout(() => {
            window.location.href = "login.html";
        }, 1200);
    }

    function showMessage(msg, cls) {
        const el = document.getElementById("message");
        el.textContent = msg;
        el.className = "mt-3 text-center " + cls;
    }
</script>

</body>
</html>
