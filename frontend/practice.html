<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Aptitude Test – TCS / Infosys / Wipro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap');

        :root {
            --bg: #0d0d0d;
            --surface: #141414;
            --card: #1a1a1a;
            --border: #2a2a2a;
            --accent: #00e5a0;
            --accent2: #ff6b35;
            --text: #f0f0f0;
            --muted: #888;
            --correct: #00e5a0;
            --wrong: #ff4d4d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background:var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
        }

        /* ── SETUP SCREEN ── */
        #setupScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            background: radial-gradient(ellipse at 60% 30%, #001f14 0%, #0d0d0d 70%);
        }

        .hero-title {
            font-size: clamp(2.4rem, 6vw, 4.5rem);
            font-weight: 800;
            letter-spacing: -2px;
            line-height: 1;
            text-align: center;
            margin-bottom: 0.4rem;
        }
        .hero-title span { color: var(--accent); }

        .hero-sub {
            color: var(--muted);
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
            margin-bottom: 2.5rem;
            text-align: center;
        }

        .company-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            width: 100%;
            max-width: 620px;
            margin-bottom: 2rem;
        }

        .company-btn {
            background: var(--card);
            border: 2px solid var(--border);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            padding: 1.1rem 0.5rem;
            border-radius: 10px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s, transform 0.15s;
            text-align: center;
            letter-spacing: 1px;
        }
        .company-btn:hover { border-color: var(--accent); transform: translateY(-3px); }
        .company-btn.active {
            border-color: var(--accent);
            background: #001f14;
            color: var(--accent);
        }

        .config-row {
            display: flex;
            gap: 1rem;
            width: 100%;
            max-width: 620px;
            margin-bottom: 1.5rem;
        }

        .config-box {
            flex: 1;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 1rem 1.2rem;
        }

        .config-box label {
            display: block;
            font-size: 0.72rem;
            color: var(--muted);
            font-family: 'Space Mono', monospace;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .config-box select {
            background: transparent;
            border: none;
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            outline: none;
        }
        .config-box select option { background: #1a1a1a; }

        .start-btn {
            background: var(--accent);
            color: #000;
            border: none;
            font-family: 'Syne', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            padding: 1rem 3rem;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 0 30px #00e5a040;
        }
        .start-btn:hover { transform: scale(1.04); box-shadow: 0 0 45px #00e5a060; }

        /* ── QUIZ SCREEN ── */
        #quizScreen { display: none; }

        .quiz-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: #0d0d0dcc;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0.9rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .quiz-meta {
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            color: var(--muted);
        }
        .quiz-meta strong { color: var(--accent); font-size: 1rem; }

        #timerDisplay {
            font-family: 'Space Mono', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent);
            min-width: 80px;
            text-align: right;
        }
        #timerDisplay.urgent { color: var(--wrong); animation: pulse 1s infinite; }

        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

        .progress-bar-wrap {
            height: 3px;
            background: var(--border);
            width: 100%;
        }
        .progress-bar-fill {
            height: 100%;
            background: var(--accent);
            transition: width 0.3s;
        }

        .questions-wrap {
            max-width: 780px;
            margin: 0 auto;
            padding: 2rem 1.5rem 6rem;
        }

        .question-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.6rem 1.8rem;
            margin-bottom: 1.2rem;
            transition: border-color 0.2s;
        }
        .question-card:focus-within { border-color: #444; }

        .q-num {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 2px;
            margin-bottom: 0.6rem;
        }

        .q-text {
            font-size: 1.02rem;
            font-weight: 600;
            line-height: 1.55;
            margin-bottom: 1.1rem;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.55rem;
        }

        .option-label {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            padding: 0.65rem 0.9rem;
            cursor: pointer;
            font-size: 0.92rem;
            transition: border-color 0.15s, background 0.15s;
            line-height: 1.35;
        }
        .option-label:hover { border-color: var(--accent); background: #001a0e; }
        .option-label input[type="radio"] { accent-color: var(--accent); width: 15px; height: 15px; flex-shrink: 0; }

        /* result states */
        .option-label.is-correct { border-color: var(--correct); background: #001f14; color: var(--correct); }
        .option-label.is-wrong   { border-color: var(--wrong);   background: #1f0000; color: var(--wrong); }

        /* ── STICKY SUBMIT ── */
        .submit-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #0d0d0dee;
            backdrop-filter: blur(14px);
            border-top: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .answered-count {
            font-family: 'Space Mono', monospace;
            font-size: 0.82rem;
            color: var(--muted);
        }
        .answered-count span { color: var(--accent); font-size: 1rem; }

        .submit-quiz-btn {
            background: var(--accent2);
            color: #fff;
            border: none;
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            padding: 0.75rem 2.5rem;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: transform 0.15s, opacity 0.15s;
        }
        .submit-quiz-btn:hover:not(:disabled) { transform: scale(1.04); }
        .submit-quiz-btn:disabled { opacity: 0.4; cursor: default; }

        /* ── RESULT SCREEN ── */
        #resultScreen {
            display: none;
            max-width: 820px;
            margin: 0 auto;
            padding: 3rem 1.5rem 4rem;
        }

        .score-card {
            background: var(--card);
            border: 2px solid var(--accent);
            border-radius: 18px;
            padding: 2.5rem;
            text-align: center;
            margin-bottom: 2.5rem;
            box-shadow: 0 0 60px #00e5a020;
        }

        .score-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: var(--muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .score-big {
            font-size: clamp(3rem, 10vw, 5.5rem);
            font-weight: 800;
            letter-spacing: -3px;
            line-height: 1;
            color: var(--accent);
        }

        .score-denom { font-size: 1.8rem; color: var(--muted); font-weight: 400; }

        .score-msg {
            margin-top: 0.8rem;
            font-size: 1.1rem;
            color: var(--muted);
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .stat-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.2rem;
            text-align: center;
        }

        .stat-val {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px;
        }
        .stat-lbl {
            font-family: 'Space Mono', monospace;
            font-size: 0.68rem;
            color: var(--muted);
            letter-spacing: 1px;
            margin-top: 0.2rem;
        }

        .wrong-section-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--muted);
        }

        .wrong-card {
            background: var(--card);
            border: 1px solid #2a0000;
            border-radius: 12px;
            padding: 1.3rem 1.5rem;
            margin-bottom: 0.9rem;
        }

        .wrong-card .q-text { color: var(--text); margin-bottom: 0.5rem; }
        .wrong-card .correct-ans { color: var(--correct); font-size: 0.9rem; font-family: 'Space Mono', monospace; }
        .wrong-card .your-ans { color: var(--wrong); font-size: 0.9rem; font-family: 'Space Mono', monospace; margin-top: 0.2rem; }

        .retry-btn {
            display: block;
            width: 100%;
            max-width: 320px;
            margin: 2rem auto 0;
            background: var(--accent);
            color: #000;
            border: none;
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            padding: 1rem;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: transform 0.15s;
        }
        .retry-btn:hover { transform: scale(1.04); }

        @media(max-width:540px) {
            .company-grid { grid-template-columns: 1fr 1fr 1fr; }
            .options-grid { grid-template-columns: 1fr; }
            .stats-row { grid-template-columns: 1fr 1fr 1fr; }
            .config-row { flex-direction: column; }
        }
    </style>
</head>
<body>

<!-- ══════════════ SETUP SCREEN ══════════════ -->
<div id="setupScreen">
    <h1 class="hero-title">Practice Aptitude<br><span>Test Bank</span>
      <a href="index.html">🏠 Home</a> </h1>
    <p class="hero-sub">TCS · INFOSYS · WIPRO — 600 questions</p>

    <p style="font-size:.8rem;color:var(--muted);margin-bottom:1rem;font-family:'Space Mono',monospace;letter-spacing:1px;">SELECT COMPANY</p>
    <div class="company-grid">
        <button class="company-btn active" data-company="TCS" onclick="selectCompany(this)">TCS</button>
        <button class="company-btn" data-company="Infosys" onclick="selectCompany(this)">Infosys</button>
        <button class="company-btn" data-company="WIPRO" onclick="selectCompany(this)">Wipro</button>
    </div>

    <div class="config-row">
        <div class="config-box">
            <label>Questions</label>
            <select id="qCount">
                <option value="10">10</option>
                <option value="20">20</option>
                <option value="30" selected>30</option>
                <option value="50">50</option>
            </select>
        </div>
        <div class="config-box">
            <label>Time Limit</label>
            <select id="timeLimit">
                <option value="600">10 min</option>
                <option value="900">15 min</option>
                <option value="1800" selected>30 min</option>
                <option value="3600">60 min</option>
            </select>
        </div>
        <div class="config-box">
            <label>Difficulty</label>
            <select id="diffFilter">
                <option value="All">All</option>
                <option value="Easy">Easy</option>
                <option value="Medium">Medium</option>
                <option value="Hard">Hard</option>
            </select>
        </div>
    </div>

    <button class="start-btn" onclick="startQuiz()">Start Test →</button>
</div>

<!-- ══════════════ QUIZ SCREEN ══════════════ -->
<div id="quizScreen">
    <div class="quiz-header">
        <div class="quiz-meta">
            <strong id="companyLabel">TCS</strong>
            &nbsp;&nbsp;Aptitude Test
        </div>
        <div id="timerDisplay">30:00</div>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>

    <div class="questions-wrap" id="quizBox"></div>

    <div class="submit-bar">
        <div class="answered-count">Answered: <span id="answeredCount">0</span> / <span id="totalCount">30</span></div>
        <button class="submit-quiz-btn" id="submitBtn" onclick="submitQuiz()">Submit Test</button>
    </div>
</div>

<!-- ══════════════ RESULT SCREEN ══════════════ -->
<div id="resultScreen">
    <div class="score-card">
        <div class="score-label">Your Score</div>
        <div class="score-big" id="scoreBig">0<span class="score-denom">/30</span></div>
        <div class="score-msg" id="scoreMsg"></div>
    </div>
    <div class="stats-row">
        <div class="stat-box"><div class="stat-val" id="statCorrect" style="color:var(--correct)">0</div><div class="stat-lbl">Correct</div></div>
        <div class="stat-box"><div class="stat-val" id="statWrong" style="color:var(--wrong)">0</div><div class="stat-lbl">Wrong</div></div>
        <div class="stat-box"><div class="stat-val" id="statSkipped" style="color:var(--muted)">0</div><div class="stat-lbl">Skipped</div></div>
    </div>
    <div class="wrong-section-title" id="wrongTitle"></div>
    <div id="wrongAnswers"></div>
    <button class="retry-btn" onclick="location.reload()">Try Again</button>
</div>

const questionBank = { TCS: tcsQuestions, Infosys: infosysQuestions, WIPRO: wiproQuestions };

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let selectedCompany = "TCS";
let activeQuestions = [];
let countdown;
let timeLeft;

// ══════════════════════════════════════════════
//  SETUP
// ══════════════════════════════════════════════
function selectCompany(btn) {
    document.querySelectorAll('.company-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedCompany = btn.dataset.company;
}

function startQuiz() {
    const qCount = parseInt(document.getElementById('qCount').value);
    const diffFilter = document.getElementById('diffFilter').value;
    timeLeft = parseInt(document.getElementById('timeLimit').value);

    let pool = questionBank[selectedCompany];
    if (diffFilter !== 'All') pool = pool.filter(q => q.diff === diffFilter);
    if (pool.length === 0) { alert('No questions found for that filter. Try a different difficulty.'); return; }

    // shuffle and slice
    const shuffled = [...pool].sort(() => Math.random() - 0.5);
    activeQuestions = shuffled.slice(0, Math.min(qCount, shuffled.length));

    document.getElementById('setupScreen').style.display = 'none';
    document.getElementById('quizScreen').style.display = 'block';
    document.getElementById('companyLabel').textContent = selectedCompany;
    document.getElementById('totalCount').textContent = activeQuestions.length;

    renderQuestions();
    startTimer();
}

// ══════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════
function renderQuestions() {
    const box = document.getElementById('quizBox');
    box.innerHTML = '';
    activeQuestions.forEach((q, i) => {
        const opts = q.opts.map((o, oi) => `
            <label class="option-label" id="lbl-${i}-${oi}">
                <input type="radio" name="q${i}" value="${oi}" onchange="updateProgress()">
                ${o}
            </label>`).join('');
        box.innerHTML += `
            <div class="question-card">
                <div class="q-num">Q ${i+1} · ${q.cat} · ${q.diff}</div>
                <div class="q-text">${q.q}</div>
                <div class="options-grid">${opts}</div>
            </div>`;
    });
}

function updateProgress() {
    let answered = 0;
    activeQuestions.forEach((_, i) => {
        if (document.querySelector(`input[name="q${i}"]:checked`)) answered++;
    });
    document.getElementById('answeredCount').textContent = answered;
    const pct = (answered / activeQuestions.length) * 100;
    document.getElementById('progressBar').style.width = pct + '%';
}

// ══════════════════════════════════════════════
//  TIMER
// ══════════════════════════════════════════════
function startTimer() {
    const display = document.getElementById('timerDisplay');
    countdown = setInterval(() => {
        timeLeft--;
        const m = String(Math.floor(timeLeft / 60)).padStart(2, '0');
        const s = String(timeLeft % 60).padStart(2, '0');
        display.textContent = `${m}:${s}`;
        if (timeLeft <= 60) display.classList.add('urgent');
        if (timeLeft <= 0) { clearInterval(countdown); submitQuiz(); }
    }, 1000);
}

// ══════════════════════════════════════════════
//  SUBMIT
// ══════════════════════════════════════════════
function submitQuiz() {
    clearInterval(countdown);
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('submitBtn').textContent = 'Submitted ✓';
    document.querySelectorAll('input[type="radio"]').forEach(i => i.disabled = true);

    let correct = 0, wrong = 0, skipped = 0;
    let wrongHTML = '';

    activeQuestions.forEach((q, i) => {
        const sel = document.querySelector(`input[name="q${i}"]:checked`);
        const selVal = sel ? parseInt(sel.value) : null;

        // highlight options
        q.opts.forEach((_, oi) => {
            const lbl = document.getElementById(`lbl-${i}-${oi}`);
            if (oi === q.ans) lbl.classList.add('is-correct');
            else if (selVal === oi) lbl.classList.add('is-wrong');
        });

        if (selVal === null) {
            skipped++;
            wrongHTML += `<div class="wrong-card"><div class="q-text">${i+1}. ${q.q}</div><div class="correct-ans">✓ Correct: ${q.opts[q.ans]}</div><div class="your-ans">– Skipped</div></div>`;
        } else if (selVal === q.ans) {
            correct++;
        } else {
            wrong++;
            wrongHTML += `<div class="wrong-card"><div class="q-text">${i+1}. ${q.q}</div><div class="correct-ans">✓ Correct: ${q.opts[q.ans]}</div><div class="your-ans">✗ Your answer: ${q.opts[selVal]}</div></div>`;
        }
    });

    const total = activeQuestions.length;
    const pct = Math.round((correct / total) * 100);
    const msg = pct >= 80 ? '🏆 Outstanding!' : pct >= 60 ? '🚀 Keep it up!' : pct >= 40 ? '📚 More practice needed.' : '💪 Don\'t give up!';

    // show result screen
    setTimeout(() => {
        document.getElementById('quizScreen').style.display = 'none';
        const rs = document.getElementById('resultScreen');
        rs.style.display = 'block';
        document.getElementById('scoreBig').innerHTML = `${correct}<span class="score-denom">/${total}</span>`;
        document.getElementById('scoreMsg').textContent = `${pct}% accuracy — ${msg}`;
        document.getElementById('statCorrect').textContent = correct;
        document.getElementById('statWrong').textContent = wrong;
        document.getElementById('statSkipped').textContent = skipped;
        document.getElementById('wrongTitle').textContent = wrong + skipped > 0 ? `Review — ${wrong + skipped} question(s) to improve` : '🎯 Perfect score!';
        document.getElementById('wrongAnswers').innerHTML = wrongHTML;
    }, 800);
}
