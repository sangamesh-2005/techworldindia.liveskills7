    <style>

            --green: #10b981;
            --yellow: #f59e0b;
            --red: #ef4444;
            --text: #e2e8f0;
            --muted: #64748b;
            --muted2: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        /* NAV */
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 28px;
            display: flex;
            align-items: center;
            gap: 6px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav a {
            color: var(--muted2);
            text-decoration: none;
            font-size: 14px;
            padding: 6px 14px;
            border-radius: 6px;
            transition: all .2s;
        }
        nav a:hover { background: var(--border); color: #fff; }
        nav .brand {
            font-family: 'Space Mono', monospace;
            font-size: 15px;
            color: var(--accent2);
            margin-right: auto;
        }

        /* HERO */
        .hero {
            padding: 48px 28px 24px;
            max-width: 1100px;
            margin: 0 auto;
        }
        .hero h1 {
            font-family: 'Space Mono', monospace;
            font-size: clamp(22px, 4vw, 34px);
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        .hero p { color: var(--muted2); font-size: 14px; }

        /* CONTROLS */
        .controls {
            max-width: 1100px;
            margin: 0 auto 28px;
            padding: 0 28px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .search-box {
            flex: 1; min-width: 220px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 9px 14px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border .2s;
        }
        .search-box:focus { border-color: var(--accent); }
        .search-box::placeholder { color: var(--muted); }

        .filter-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--muted2);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all .2s;
            font-family: 'DM Sans', sans-serif;
        }
        .filter-btn:hover, .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        /* STATS BAR */
        .stats-bar {
            max-width: 1100px;
            margin: 0 auto 20px;
            padding: 0 28px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .stat-pill {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .stat-pill .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
        }

        /* GRID */
        .grid {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 28px 60px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 14px;
        }

        /* CARD */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px 20px;
            cursor: pointer;
            transition: border-color .2s, transform .15s, box-shadow .2s;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            border-radius: 12px 0 0 12px;
        }
        .card.easy::before   { background: var(--green); }
        .card.medium::before { background: var(--yellow); }
        .card.hard::before   { background: var(--red); }

        .card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,114,255,.15);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 10px;
        }
        .card-num {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            white-space: nowrap;
            margin-top: 2px;
        }
        .badge {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 600;
            white-space: nowrap;
        }
        .badge.easy   { background: rgba(16,185,129,.15); color: #10b981; border: 1px solid rgba(16,185,129,.3); }
        .badge.medium { background: rgba(245,158,11,.15); color: #f59e0b; border: 1px solid rgba(245,158,11,.3); }
        .badge.hard   { background: rgba(239,68,68,.15);  color: #ef4444; border: 1px solid rgba(239,68,68,.3); }

        .card-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            line-height: 1.5;
            margin-bottom: 8px;
        }
        .card-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .tag {
            font-size: 11px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--muted2);
            padding: 2px 9px;
            border-radius: 4px;
        }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.75);
            z-index: 200;
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 14px;
            max-width: 680px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 28px;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 14px; right: 16px;
            background: none;
            border: 1px solid var(--border);
            color: var(--muted2);
            width: 30px; height: 30px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-close:hover { background: var(--border); color: #fff; }
        .modal h3 {
            font-size: 15px;
            margin-bottom: 16px;
            padding-right: 40px;
            line-height: 1.5;
        }
        .option {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 11px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-bottom: 8px;
            cursor: pointer;
            transition: all .15s;
            font-size: 14px;
        }
        .option:hover { border-color: var(--accent); background: rgba(0,114,255,.07); }
        .option.selected.correct { background: rgba(16,185,129,.12); border-color: var(--green); color: var(--green); }
        .option.selected.wrong   { background: rgba(239,68,68,.12);  border-color: var(--red);   color: var(--red); }
        .option.reveal.correct   { background: rgba(16,185,129,.12); border-color: var(--green); color: var(--green); }
        .opt-letter {
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            width: 24px; height: 24px;
            border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .result-msg {
            margin-top: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            display: none;
        }

        .result-msg.wrong   { background: rgba(239,68,68,.1);  border: 1px solid var(--red);   color: var(--red); }

// ADD THESE VARIABLES BELOW:
let activeFilter = 'all';
let currentQ = null;

let filteredQuestions = [];
let currentIndex = 0;

function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
}

function getFiltered() {
    const q = document.getElementById('searchBox').value.toLowerCase();
    return ALL.filter(item => {
        const matchCat = activeFilter === 'all' ||
            item.cat === activeFilter ||
            item.src === activeFilter ||
            item.diff === activeFilter;
        const matchSearch = !q || item.q.toLowerCase().includes(q) || item.cat.toLowerCase().includes(q);
        return matchCat && matchSearch;
    });
}

function render() {
    const data = getFiltered();
    const grid = document.getElementById('grid');
    const easy = data.filter(d=>d.diff==='Easy').length;
    const med  = data.filter(d=>d.diff==='Medium').length;
    const hard = data.filter(d=>d.diff==='Hard').length;
    document.getElementById('easyCount').textContent = easy + ' Easy';
    document.getElementById('medCount').textContent  = med  + ' Medium';
    document.getElementById('hardCount').textContent = hard + ' Hard';
    document.getElementById('totalCount').textContent = data.length + ' Total';

    if (!data.length) {
        grid.innerHTML = `<div class="empty"><span>🔍</span>No questions match your filter.</div>`;
        return;
    }

    grid.innerHTML = data.map((item,i) => `
        <div class="card ${item.diff.toLowerCase()}" onclick="openModal(${item.id})">
            <div class="card-header">
                <span class="card-num">#${String(i+1).padStart(3,'0')}</span>
                <span class="badge ${item.diff.toLowerCase()}">${item.diff}</span>
            </div>
            <div class="card-title">${item.q.split('\n')[0].slice(0,110)}${item.q.length>110?'…':''}</div>
            <div class="card-meta">
                <span class="tag">${item.cat}</span>
                <span class="tag">${item.src}</span>
            </div>
        </div>`).join('');
}

// ══════════════════════════════════════════════════════════
// ADD THIS NEW FUNCTION
// ══════════════════════════════════════════════════════════

function loadQuestion(index){

    const item = filteredQuestions[index];

    if (!item) return;

    currentQ = {
        item,
        answered: false
    };

    document.getElementById('mTitle').textContent = item.q;

    document.getElementById('mBadge').className =
        `badge ${item.diff.toLowerCase()}`;

    document.getElementById('mBadge').textContent =
        item.diff;

    document.getElementById('mTag').textContent =
        item.cat;

    document.getElementById('mNum').textContent =
        `Q${item.id} · ${item.src}`;

    const letters = ['A','B','C','D'];

    document.getElementById('mOptions').innerHTML =
        item.opts.map((o,i)=>`
            <div class="option" onclick="selectOpt(${i})">
                <span class="opt-letter">${letters[i]}</span>
                <span>${o}</span>
            </div>
        `).join('');

    const rm = document.getElementById('resultMsg');

    rm.style.display = 'none';

    rm.className = 'result-msg';

    const prevBtn = document.getElementById('prevBtn');

    const nextBtn = document.getElementById('nextBtn');

    if(prevBtn){
        prevBtn.disabled = currentIndex === 0;
    }

    if(nextBtn){
        nextBtn.disabled =
            currentIndex === filteredQuestions.length - 1;
    }
}
function nextQuestion(){

    if(currentIndex < filteredQuestions.length - 1){

        currentIndex++;

        loadQuestion(currentIndex);
    }
}

function prevQuestion(){

    if(currentIndex > 0){

        currentIndex--;

        loadQuestion(currentIndex);
    }
}

function selectOpt(idx) {
    if (currentQ?.answered) return;
    currentQ.answered = true;
    const item = currentQ.item;
    const correct = item.ans;
    const rm = document.getElementById('resultMsg');

    document.querySelectorAll('.option').forEach((el,i)=>{
        if (i === correct) el.classList.add('selected','correct');
        else if (i === idx && i !== correct) el.classList.add('selected','wrong');
    });

    if (idx === correct) {
        rm.textContent = '✓ Correct!';
        rm.className = 'result-msg correct';
    } else {
        rm.textContent = `✗ Incorrect. Correct answer: ${['A','B','C','D'][correct]}) ${item.opts[correct]}`;
        rm.className = 'result-msg wrong';
    }
    rm.style.display='block';
}

function closeModal(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow='';
    currentQ = null;
}// ══════════════════════════════════════════════════════════

}
