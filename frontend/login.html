<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | techworldindia.liveskills2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #05080f;
        }

        .card-box {
            width: 480px;
            background: #0b0f19;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.7);
        }

        .title {
            color: white;
            font-weight: 700;
            margin-bottom: 6px;
            font-size: 1.2rem;
        }

        .title span {
            color: #00c6ff;
        }

        .subtitle {
            color: #888;
            text-align: center;
            margin-bottom: 28px;
            font-size: 15px;
        }

        .form-label {
            color: #aaa;
            font-size: 13px;
        }

        /* FIX: Proper input styling */
        .form-control {
            background: #1a1f2e !important;
            border: 1px solid #2a2f3e !important;
            color: white !important;
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 15px;
        }

        .form-control::placeholder {
            color: #aaa;
        }

        .form-control:focus {
            box-shadow: 0 0 0 2px rgba(0, 198, 255, 0.3) !important;
            border-color: #00c6ff !important;
        }

        .btn-custom {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            font-weight: 600;
            padding: 12px;
            font-size: 15px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn-custom:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .link {
            color: #00c6ff;
            cursor: pointer;
            text-decoration: none;
        }

        .link:hover {
            text-decoration: underline;
        }

        #message {
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            margin-top: 12px;
        }
    </style>
</head>

<!-- FIX: body uses flexbox to center the card -->
<body class="d-flex justify-content-center align-items-center vh-100">

<div class="card-box">
    <h3 class="title text-center">techworldindia.<span>liveskills2026</span></h3>
    <p class="subtitle">Welcome Back</p>

    <!-- FIX: Wrapped in <form> so submit event works; removed duplicate labels -->
    <form id="loginForm" onsubmit="loginUser(event)">
        <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
        </div>
        <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn btn-custom w-100 mb-3 text-white">Login</button>
    </form>

    <p class="text-center text-secondary" style="font-size:14px;">
        Don't have an account?
        <a href="signup.html" class="link fw-bold">Sign Up</a>
        <div> 
              <p class="text-center text-secondary" style="font-size:14px;">
            Forgot Password?
            <a href="forgot-password.html">Forgot Password?</a>
              </p>
        </div>
    </p>

    <div id="message"></div>
</div>
<script>
    // FIX: Single clean handler - no conflicting duplicate listeners
    function loginUser(event) {
        event.preventDefault();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        if (!email || !password) {
            showMessage("Please enter both email and password.", "text-danger");
            return;
        }

        // Read from localStorage (saved during signup)
        const savedEmail = localStorage.getItem("email");
        const savedPassword = localStorage.getItem("password");

        if (!savedEmail || !savedPassword) {
            showMessage("No account found. Please sign up first.", "text-warning");
            return;
        }

        if (email === savedEmail && password === savedPassword) {
            localStorage.setItem("loggedIn", "true");
            showMessage("Login successful! Redirecting...", "text-success");
            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1000);
        } else {
            showMessage("Invalid email or password.", "text-danger");
        }
    }

    function showMessage(msg, cls) {
        const el = document.getElementById("message");
        el.textContent = msg;
        el.className = cls;
    }
</script>

</body>
</html>
