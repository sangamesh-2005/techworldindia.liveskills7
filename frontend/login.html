<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | techworldindia.liveskills2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin-top:15px;
            background: #05080f;
            font-family: 'Poppins', sans-serif;
        }
    .form-control {
           margin-top: 15px;
           display: block;
           width: 100%;
           padding: .375rem .75rem;
           font-size: 1rem;
           font-weight: 400;
           line-height: 1.5;
    }

        .card-box {
            margin-top:15px;
            width: 480px;
            background: #0b0f19;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
        }

        .title {
            color: white;
            font-weight: 600;
            text-align: left;
            margin-bottom: 50px;
        }

        .subtitle {
            color: #888;
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            background: #1a1f2e !important;
            border: none !important;
            color: white !important;
        }

        input::placeholder {
            color: #aaa;
        }

        .btn-custom {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
        }

        .link {
            color: #00c6ff;
            cursor: pointer;
        }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center vh-100">

<div class="card-box">

    <h3 class="title">techworldindia.liveskills2026</h3>
    <p class="subtitle">Welcome Back</p>

    <input type="email" id="email" class="form-control" placeholder="Email">

    <input type="password" id="password" class="form-control" placeholder="Password">
    <div class="mb-3">
        <label for="email" class="form-label">Email Address</label>
    </div>

    <button class="btn btn-custom w-100 mb-3" onclick="loginUser(event)">Login</button>

    <p class="text-center text-light">
        Don't have an account?
        <span class="link" onclick="goSignup()">Sign Up</span>
    </p>

</div>

<script>
const API = "http://localhost:5000/api";

async function loginUser(event) {
    event.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (!email || !password) {
        alert("Enter all fields");
        return;
    }

    const res = await fetch(`${API}/login`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.user) {
        localStorage.setItem("user", JSON.stringify(data.user));
        window.location.href = "dashboard.html";
    } else {
        alert(data.message);
    }
}

function goSignup() {
    window.location.href = "signup.html";
}
document.querySelector("form").addEventListener("submit", function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const savedEmail = localStorage.getItem("email");
    const savedPassword = localStorage.getItem("password");

    if(email === savedEmail && password === savedPassword) {

        localStorage.setItem("loggedIn", "true");

        alert("Login Successful!");

        window.location.href = "dashboard.html";

    } else {

        alert("Invalid Email or Password");

    }
});
</script>
</body>
</html>
